<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DoneLog · 完成日志与时间记录</title>
<meta name="description" content="DoneLog helps you track completed tasks, review time spent, and export CSV/PDF reports. DoneLog 帮你记录完成事项，回顾时间投入，并支持 CSV/PDF 导出。">
<link rel="icon" href="donelog_icon.png">
<style>
:root{
  --bg:#16171E; --surface:#1E1F27; --text:#E8EAF4; --text2:#B4B8C9; --blue:#7DA6FF;
  --joy:#FFD54F; --calm:#4DA8FF; --anx:#FF7043; --sad:#7E57C2; --ener:#2ECC71;
}
*{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--text);
font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, Noto Sans, "PingFang SC", "Hiragino Sans GB", "Microsoft Yahei", sans-serif;}
a{color:var(--blue);text-decoration:none}
.container{max-width:1100px;margin:0 auto;padding:40px 24px}
nav{display:flex;justify-content:space-between;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:12px;font-weight:700}
.brand img.icon{width:40px;height:40px;border-radius:12px}
.lang-switch{display:flex;gap:8px;background:var(--surface);border-radius:12px;padding:6px}
.lang-switch button{all:unset;cursor:pointer;padding:6px 14px;border-radius:10px;color:var(--text2);font-weight:600}
.lang-switch button.active{background:var(--blue);color:#0B1220}
.hero{display:grid;grid-template-columns:1.1fr 0.9fr;gap:36px;align-items:center;margin-top:40px}
.hero h1{font-size:40px;line-height:1.1;margin:0 0 16px}
.hero p.lead{color:var(--text2);font-size:18px;margin:0 0 24px}
.cta{display:flex;gap:12px;flex-wrap:wrap}
.button{display:inline-flex;align-items:center;gap:10px;background:var(--blue);color:#0B1220;font-weight:700;
  padding:14px 22px;border-radius:14px;box-shadow:0 10px 30px rgba(125,166,255,.25);}
.button.ghost{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,.15)}
.card{background:var(--surface);border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.section{margin-top:80px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px}
.tag{display:inline-block;padding:6px 10px;border-radius:8px;font-size:13px}
.sample{width:100%;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.35);background:#0f1118;aspect-ratio:9/19.5;object-fit:cover}
.footer{margin-top:80px;color:var(--text2);font-size:14px;border-top:1px solid rgba(255,255,255,.08);padding:32px 0}
.colorbar{height:10px;border-radius:999px;background:linear-gradient(90deg,var(--calm),var(--ener),var(--joy),var(--anx),var(--sad));}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.gallery img{width:100%;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.35);background:#0f1118;aspect-ratio:9/19.5;object-fit:cover}
@media (max-width:960px){ .hero{grid-template-columns:1fr} }
.nav-links{display:flex;gap:18px;align-items:center}
.nav-links a{color:var(--text2);font-weight:600}
.nav-links a:hover{color:var(--text)}
.small{color:var(--text2);font-size:14px;line-height:1.7}
ul.bullets{margin:12px 0 0 18px; color: var(--text2); line-height:1.7}
</style>
</head>
<body>
<div class="container">
  <nav>
    <div class="brand">
      <img class="icon" src="donelog_icon.png" alt="DoneLog icon">
      <span data-en="DoneLog" data-zh="DoneLog · 完成日志与时间记录"></span>
    </div>

    <div class="nav-links">
      <a href="#features" data-en="Features" data-zh="功能"></a>
      <a href="#privacy" data-en="Privacy" data-zh="隐私"></a>
      <a href="#support" data-en="Support" data-zh="支持"></a>
    </div>

    <div class="lang-switch">
      <button id="btn-en" class="active">English</button>
      <button id="btn-zh">中文</button>
    </div>
  </nav>

  <section class="hero">
    <div>
      <h1 data-en="Record what you actually did"
          data-zh="记录你真正做过的事"></h1>

      <p class="lead"
         data-en="DoneLog helps you track completed tasks, visualize your time, and export CSV/PDF reports."
         data-zh="DoneLog 帮你记录完成事项、追踪时间投入，并通过时间轴与统计图表回顾每日活动，支持 CSV / PDF 导出。"></p>

      <div class="cta">
        <a href="https://example.com" class="button" target="_blank" rel="noopener"
           data-en="Launch" data-zh="打开应用/商店"></a>
        <a href="#features" class="button ghost" data-en="Learn more" data-zh="了解功能"></a>
      </div>

      <div style="margin-top:24px;color:var(--text2)">
        <span>• </span><span data-en="Activity logging" data-zh="活动记录"></span><br>
        <span>• </span><span data-en="Timeline & Insights" data-zh="时间轴与洞察"></span><br>
        <span>• </span><span data-en="Categories, Reminders, Export" data-zh="分类管理 · 提醒 · 导出"></span>
      </div>

      <div style="margin-top:16px" class="colorbar" aria-hidden="true"></div>
    </div>

    <div>
      <img class="sample" src="hero_en.png" data-en-src="hero_en.png" data-zh-src="hero_zh.png" alt="DoneLog hero screenshot">
      <div class="small" style="margin-top:10px"
           data-en="Replace hero_en.png / hero_zh.png with your real screenshot."
           data-zh="将 hero_en.png / hero_zh.png 替换为真实截图。"></div>
    </div>
  </section>

  <section id="features" class="section">
    <h2 data-en="Core features" data-zh="核心功能"></h2>
    <div class="grid-3" style="margin-top:24px">

      <div class="card">
        <div class="tag" style="background:rgba(77,168,255,.18);color:var(--calm)"
             data-en="Activity Logging" data-zh="活动记录"></div>
        <h3 style="margin:12px 0" data-en="Log completed tasks" data-zh="记录完成任务"></h3>
        <p class="small"
           data-en="Record completed tasks with title, notes, start/end time, and milestones."
           data-zh="记录完成任务，包括标题、备注、开始/结束时间，以及里程碑标记。"></p>
      </div>

      <div class="card">
        <div class="tag" style="background:rgba(46,204,113,.18);color:var(--ener)"
             data-en="Timeline" data-zh="时间轴"></div>
        <h3 style="margin:12px 0" data-en="Timeline View" data-zh="时间轴视图"></h3>
        <p class="small"
           data-en="Review your day in chronological order to visualize time blocks."
           data-zh="按时间顺序回顾每天活动轨迹，清晰了解时间分配。"></p>
      </div>

      <div class="card">
        <div class="tag" style="background:rgba(255,213,79,.18);color:var(--joy)"
             data-en="Insights" data-zh="洞察分析"></div>
        <h3 style="margin:12px 0" data-en="Visual insights & analytics" data-zh="洞察分析"></h3>
        <p class="small"
           data-en="See time distribution, activity frequency, and category statistics visually."
           data-zh="通过图表查看时间分布、活动频率和分类占比。"></p>
      </div>

      <div class="card">
        <div class="tag" style="background:rgba(126,87,194,.18);color:var(--sad)"
             data-en="Categories" data-zh="分类管理"></div>
        <h3 style="margin:12px 0" data-en="Custom categories" data-zh="自定义分类"></h3>
        <p class="small"
           data-en="Create personalized categories with names, icons, and colors."
           data-zh="创建个性化分类，包括名称、图标与主题颜色。"></p>
      </div>

      <div class="card">
        <div class="tag" style="background:rgba(255,112,67,.18);color:var(--anx)"
             data-en="Reminders" data-zh="提醒"></div>
        <h3 style="margin:12px 0" data-en="Timely notifications" data-zh="本地提醒"></h3>
        <p class="small"
           data-en="Set reminders at custom intervals to log tasks promptly."
           data-zh="自定义提醒频率，例如每 30 分钟、1 小时或 2 小时提醒一次。"></p>
      </div>

      <div class="card">
        <div class="tag" style="background:rgba(125,166,255,.18);color:var(--blue)"
             data-en="Export" data-zh="导出"></div>
        <h3 style="margin:12px 0" data-en="CSV & PDF reports" data-zh="CSV / PDF 导出"></h3>
        <p class="small"
           data-en="Export your records as CSV files or generate PDF reports for review or sharing."
           data-zh="支持导出 CSV 文件或生成 PDF 报告，用于复盘或分享。"></p>
      </div>

    </div>
  </section>

  <section class="section">
    <h2 data-en="Screenshots" data-zh="界面预览"></h2>
    <p class="lead" data-en="Replace with DoneLog screenshots" data-zh="将下方占位图替换为 DoneLog 真实截图。"></p>
    <div class="gallery" style="margin-top:16px">
      <img src="ss_en_1.png" data-en-src="ss_en_1.png" data-zh-src="ss_zh_1.png" alt="screenshot 1">
      <img src="ss_en_2.png" data-en-src="ss_en_2.png" data-zh-src="ss_zh_2.png" alt="screenshot 2">
      <img src="ss_en_3.png" data-en-src="ss_en_3.png" data-zh-src="ss_zh_3.png" alt="screenshot 3">
      <img src="ss_en_4.png" data-en-src="ss_en_4.png" data-zh-src="ss_zh_4.png" alt="screenshot 4">
    </div>
  </section>

  <section class="section">
    <div class="grid-2">
      <div class="card">
        <h2 id="privacy" data-en="Privacy" data-zh="隐私"></h2>
        <p class="small" data-en="No account required. All logs are stored locally by default."
           data-zh="无需注册账号。所有记录默认保存在本地，由你完全掌控。"></p>
        <ul class="bullets">
          <li data-en="We do not sell your data." data-zh="我们不出售用户数据。"></li>
          <li data-en="You control imports, exports, and reports." data-zh="你可以完全掌控导入、导出与报告。"></li>
        </ul>
      </div>

      <div class="card">
        <h2 id="support" data-en="Support" data-zh="支持"></h2>
        <p class="small" data-en="Questions or feedback? Email us." data-zh="有问题或建议？欢迎发送邮件联系。"></p>
        <p><a href="mailto:freesysck@outlook.com">freesysck@outlook.com</a></p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="grid-2">
      <div>
        <strong data-en="DoneLog · Done List & Time Log" data-zh="DoneLog · 完成日志与时间记录"></strong><br>
        <span data-en="© 2026 DoneLog. All rights reserved." data-zh="© 2026 DoneLog。保留所有权利。"></span>
      </div>
    </div>
  </footer>
</div>

<script>
function swapLangImages(lang){
  document.querySelectorAll("img[data-en-src]").forEach(img=>{
    const src = img.getAttribute(lang==="zh" ? "data-zh-src" : "data-en-src");
    if(src) img.setAttribute("src", src);
  });
}

function setLang(lang){
  document.querySelectorAll("[data-en]").forEach(el=>{
    const text = el.getAttribute(lang === "zh" ? "data-zh" : "data-en");
    if(text!==null){ el.textContent = text; }
  });

  swapLangImages(lang);

  document.getElementById("btn-en").classList.toggle("active", lang==="en");
  document.getElementById("btn-zh").classList.toggle("active", lang==="zh");
  localStorage.setItem("donelog-lang", lang);
}

document.getElementById("btn-en").onclick=()=>setLang("en");
document.getElementById("btn-zh").onclick=()=>setLang("zh");
const saved = localStorage.getItem("donelog-lang") || (navigator.language && navigator.language.startsWith("zh") ? "zh" : "en");
setLang(saved);
</script>
</body>
</html>
